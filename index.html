<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HWANG'S BRIEF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg:#ffffff; --surface:#f9f9f8; --surface-2:#f0f0ef;
    --border:#e5e5e3; --border-2:#d1d1ce;
    --text:#1a1a19; --text-2:#4a4a47; --muted:#8a8a85;
    --accent:#d97706; --accent-bg:#fffbeb;
    --good:#059669; --good-bg:#ecfdf5; --good-border:#a7f3d0;
    --bad:#dc2626; --bad-bg:#fef2f2; --bad-border:#fecaca;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased; }

  .sidebar { position:fixed; top:0; left:0; bottom:0; width:240px; background:var(--surface); border-right:1px solid var(--border); padding:20px 16px; overflow-y:auto; z-index:10; display:flex; flex-direction:column; gap:0; }
  .main { margin-left:240px; min-height:100vh; }
  .main-inner { max-width:860px; margin:0 auto; padding:32px 24px 80px; }

  .logo { display:flex; align-items:center; gap:10px; margin-bottom:24px; }
  .logo-icon { width:32px; height:32px; border-radius:8px; background:var(--text); color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .logo-text { font-weight:700; font-size:15px; }
  .logo-sub { font-size:11px; color:var(--muted); }

  .sidebar-section { margin-bottom:20px; }
  .sidebar-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
  .sidebar-btn { width:100%; text-align:left; background:none; border:none; padding:7px 10px; border-radius:6px; color:var(--text-2); font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; display:flex; align-items:center; gap:8px; }
  .sidebar-btn:hover { background:var(--surface-2); }
  .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .dot-amber { background:var(--accent); }
  .dot-green { background:var(--good); }
  .dot-gray { background:var(--muted); }

  .key-section { margin-top:auto; padding-top:16px; border-top:1px solid var(--border); }
  .key-label { font-size:11px; color:var(--muted); margin-bottom:6px; font-weight:500; }
  .key-input-row { display:flex; gap:6px; }
  .key-input { flex:1; min-width:0; padding:6px 8px; border:1px solid var(--border-2); border-radius:6px; font-size:12px; font-family:'JetBrains Mono',monospace; background:var(--bg); color:var(--text); }
  .key-input:focus { outline:none; border-color:var(--accent); }
  .key-status { font-size:11px; margin-top:5px; font-family:'JetBrains Mono',monospace; }
  .key-status.set { color:var(--good); }
  .key-status.unset { color:var(--muted); }
  .btn-xs { padding:6px 10px; border-radius:6px; border:1px solid var(--border-2); font-size:12px; cursor:pointer; background:var(--bg); color:var(--text-2); font-family:'Inter',sans-serif; white-space:nowrap; }
  .btn-xs:hover { background:var(--surface-2); }

  .page-title { font-size:20px; font-weight:700; margin-bottom:4px; }
  .page-sub { color:var(--muted); font-size:13px; margin-bottom:28px; }

  .upload-zone { border:2px dashed var(--border-2); border-radius:12px; padding:36px 24px; text-align:center; cursor:pointer; transition:all .15s; background:var(--surface); }
  .upload-zone:hover, .upload-zone.drag-over { border-color:var(--accent); background:var(--accent-bg); }
  .upload-icon { font-size:36px; margin-bottom:12px; }
  .upload-title { font-size:15px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .upload-sub { font-size:13px; color:var(--muted); }
  .upload-types { font-size:11px; color:var(--border-2); margin-top:8px; font-family:'JetBrains Mono',monospace; }
  input[type="file"] { display:none; }

  .file-loaded { border:1px solid var(--good-border); border-radius:10px; padding:14px 16px; background:var(--good-bg); display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .file-name { font-size:14px; font-weight:600; color:var(--good); }
  .file-meta { font-size:12px; color:#065f46; margin-top:2px; font-family:'JetBrains Mono',monospace; }
  .file-clear { background:none; border:none; color:#065f46; cursor:pointer; font-size:18px; padding:4px; }

  .gen-row { display:flex; align-items:center; justify-content:space-between; margin-top:16px; flex-wrap:wrap; gap:8px; }
  .btn-main { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:8px; border:none; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:opacity .15s; color:#fff; }
  .btn-main:hover { opacity:.85; }
  .btn-main:disabled { background:var(--border-2) !important; color:var(--muted); cursor:not-allowed; opacity:1; }
  .btn-brief { background:#1d4ed8; }
  .btn-map { background:#15803d; }
  .btn-ghost { background:none; border:none; color:var(--muted); font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; padding:4px 0; }
  .btn-ghost:hover { color:var(--text-2); }

  .error-box { display:flex; gap:8px; align-items:flex-start; background:var(--bad-bg); border:1px solid var(--bad-border); color:var(--bad); border-radius:8px; padding:12px; font-size:13px; margin-top:16px; }

  .progress-box { margin-top:24px; padding:14px 16px; border-radius:10px; border:1px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text-2); }
  .spin { display:inline-block; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .output-card { margin-top:28px; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .output-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); }
  .output-header-left { display:flex; align-items:center; gap:8px; }
  .output-tag { font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.05em; }
  .tag-brief { background:#eff6ff; color:#1d4ed8; }
  .tag-map { background:#f0fdf4; color:#15803d; }
  .output-title { font-size:14px; font-weight:600; }
  .output-actions { display:flex; gap:6px; }
  .btn-sm { padding:5px 12px; border-radius:6px; border:1px solid var(--border-2); font-size:12px; font-weight:500; cursor:pointer; background:var(--bg); color:var(--text-2); font-family:'Inter',sans-serif; }
  .btn-sm:hover { background:var(--surface-2); }
  .output-body { padding:20px; background:var(--bg); font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.75; white-space:pre-wrap; max-height:500px; overflow-y:auto; }

  /* Map */
  #mapContainer { position:relative; }
  #leafletMap { width:100%; height:520px; background:#e8e8e8; }
  .map-controls { position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:1000; display:flex; gap:8px; }
  .map-toggle { padding:7px 16px; border-radius:20px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; box-shadow:0 2px 6px rgba(0,0,0,.25); }
  .map-toggle.route { background:#16a34a; color:#fff; }
  .map-toggle.notam { background:#dc2626; color:#fff; }
  .map-toggle.off { opacity:.45; }
  .map-info { position:absolute; bottom:10px; left:10px; z-index:1000; background:rgba(10,10,30,.88); color:#fff; border-radius:10px; padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.8; pointer-events:none; }
  .map-info .hi { color:#4ade80; font-weight:600; }

  .section-title { font-size:13px; font-weight:600; color:var(--text-2); margin:32px 0 12px; }
  .archive-item { display:flex; align-items:center; justify-content:space-between; gap:10px; border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:6px; background:var(--bg); }
  .archive-item:hover { background:var(--surface); }
  .archive-load { background:none; border:none; text-align:left; flex:1; min-width:0; cursor:pointer; padding:0; }
  .archive-preview { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .archive-meta { font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-top:2px; }
  .archive-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:4px; }
  .archive-del:hover { color:var(--bad); }
  .empty-note { color:var(--muted); font-size:13px; padding:8px 0; }

  @media (max-width:680px) { .sidebar { display:none; } .main { margin-left:0; } }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">✈</div>
    <div><div class="logo-text">HWANG'S BRIEF</div><div class="logo-sub">KAL A350 OPS</div></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">출력 항목</div>
    <div class="sidebar-btn"><span class="dot dot-amber"></span>비행 브리핑</div>
    <div class="sidebar-btn"><span class="dot dot-green"></span>루트 · 노탐 지도</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">보관함</div>
    <div id="sidebarArchive"><div style="color:var(--muted);font-size:12px;padding:4px 10px;">저장된 항목 없음</div></div>
  </div>
  <div class="key-section">
    <div class="key-label">Anthropic API 키</div>
    <div class="key-input-row">
      <input type="password" class="key-input" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" />
      <button class="btn-xs" id="saveKeyBtn">저장</button>
    </div>
    <div class="key-status unset" id="keyStatus">키 미설정</div>
    <button class="btn-xs" style="margin-top:6px;width:100%;" id="clearKeyBtn">키 삭제</button>
  </div>
</div>

<div class="main">
  <div class="main-inner">
    <div class="page-title">비행 브리핑 생성</div>
    <div class="page-sub">OFP 파일을 업로드하면 브리핑과 루트 지도를 생성합니다.</div>

    <div id="uploadZone" class="upload-zone">
      <div class="upload-icon">📂</div>
      <div class="upload-title">파일을 드래그하거나 클릭해서 선택</div>
      <div class="upload-sub">OFP · 노탐 원문 파일 업로드</div>
      <div class="upload-types">지원: .txt · .rte · .pfx · .log · .pdf 등</div>
    </div>
    <input type="file" id="fileInput" accept=".txt,.rte,.pfx,.log,.pdf,.dat,.fpl,.xml,.out,.asc,text/*" />

    <div class="file-loaded" id="fileLoaded" style="display:none;">
      <div><div class="file-name" id="fileName"></div><div class="file-meta" id="fileMeta"></div></div>
      <button class="file-clear" id="fileClear">✕</button>
    </div>

    <div class="gen-row">
      <button class="btn-ghost" id="resetBtn">↺ 초기화</button>
      <div style="display:flex;gap:8px;">
        <button class="btn-main btn-brief" id="generateBriefBtn" disabled>📋 브리핑 생성</button>
        <button class="btn-main btn-map" id="generateMapBtn" disabled>🗺 지도 생성</button>
      </div>
    </div>

    <div class="error-box" id="errorBox" style="display:none;"></div>
    <div class="progress-box" id="progressBox" style="display:none;">
      <span class="spin">⟳</span><span id="progressLabel">생성 중...</span>
    </div>

    <!-- Briefing output -->
    <div class="output-card" id="briefCard" style="display:none;">
      <div class="output-header">
        <div class="output-header-left">
          <span class="output-tag tag-brief">브리핑</span>
          <span class="output-title">비행 브리핑</span>
        </div>
        <div class="output-actions">
          <button class="btn-sm" id="copyBriefBtn">복사</button>
          <button class="btn-sm" id="saveBriefBtn">보관함 저장</button>
        </div>
      </div>
      <div class="output-body" id="briefOutput"></div>
    </div>

    <!-- Map output -->
    <div class="output-card" id="mapCard" style="display:none;">
      <div class="output-header">
        <div class="output-header-left">
          <span class="output-tag tag-map">지도</span>
          <span class="output-title">루트 · 노탐 지도</span>
        </div>
      </div>
      <div id="mapContainer">
        <div class="map-controls">
          <button class="map-toggle route" id="toggleRoute">✈ 항로</button>
          <button class="map-toggle notam" id="toggleNotam">⚠ NOTAM</button>
        </div>
        <div id="leafletMap"></div>
        <div class="map-info" id="mapInfo" style="display:none;"></div>
      </div>
    </div>

    <!-- Archive -->
    <div id="archiveSection" style="display:none;">
      <div class="section-title">보관함</div>
      <div id="archiveList"></div>
    </div>
  </div>
</div>

<script>
const BRIEFING_SYSTEM = `당신은 대한항공 A350의 기장이야.
매번 올리는 파일은 처음부터 CFP PLAN, COPY OF ATS FPL, DISPATCH RELEASE INFORMATION, WEATHER BRIEFING INFOMATIONS, KOREAN AIR NOTAM PACKAGE 1,2,3 , 후에 CFP PLAN이 한 번 더 나오는 순서대로 배열되었다.
되도록이면 내가 원하는 지시사항에만 충실해줘.
비행계획서를 받으면 처음 CFP PLAN 에서 비행편명, 날짜, 총 비행시간 (TIME 밑의 숫자), 출발시간( ETD 출발공항 출발시간), 도착시간( ETA 도착공항 도착시간) 을 확인해 알려주고,
CFP plan의 웨이포인트 나오기 전 위에있는 출발공항부터 도착공항까지의 요약된 항로의 웨이포인트, 항로 와 copy of ats fpl 을 비교해서 copy of ats fpl 상에서 일치하는 웨이포인트, 항로를 굵은글씨로 표시해서 쉽게 확인할 수 있도록 해줘.
zt 밑의 actm 은 이륙 후 waypoint 도착 시간이므로 <출발시간(UTC) + ACTM = 도착시간> 을 이용할 것.
ACTM 이랑 Z time 을 혼동하지 않도록 주의.
필요한 waypoints 언급시엔 우리가 항상 후 언제쯤 도착하는지를 알아보기 쉽도록 actm을 같이 언급해줄것.(zt은 보여줄필요없음)
계획된 순항고도에 대해 간략하게알려주고,
CFP PLAN 의 모든 waypoints는 세로로 배열되고 한 Waypoint는 3줄로 구성되고 MW (maximum wind level) 바로 상단에 위치한 SR 수치는 Turb의 강도를 나타낸다.
TOC 부터 TOD 사이의 웨이포인트에 있는 SR 수치가 05 이상인 모든 WAYPOINTS를 추출해서 보여주고, 그 SR 수치랑 그 도착시간을 알려줘.
Refile Flight Plan의 SR 수치는 무시하고 생략하고, Refile 과 Refile Alternate 공항이 어딘지 보여줄것.
Dispatch release information 의 모든 내용이 중요하니 모두 정리해주고, 거기에 first A/B, business C/D, economy E/F 는 승객숫자로 A+C+E 만 더하면 총 승객숫자인데, 이 승객현황을 알려줘.
특히 DISPATCH RELEASE INFORMATION의 5번 항목 5. Dispatch Notes 의 Turb 정보는 from waypoint to waypoint 라고 나오는데 이 position 에 도착시간을 각각 얘기해 주면 돼. (TURB 정보에 위치가 없다면 정보가 없으니까 다른곳에서 찾지않는다).
DISPATCH RELEASE INFORMATION 에 waypoints가 나온다면 항상 도착시간을 포함해서 보여줄 것.
노탐의 유효시간범위란
출발공항: ETD −1h ~ ETD +3h
목적지·교체공항: ETA - 30min ~ ETA +2h
Refile·Refile Alternate: Refile ACTM ~ Refile ACTM +3h
EDTO/ERA Alternate: ERA 구간 진입 ACTM ~ 이탈 ACTM +3h
Enroute FIR: FIR 진입 ACTM ~ FIR 이탈 ACTM +2h
를 기준으로한다.
노탐 내용 중 해당 유효시간범위에 포함되는 모든 유효한 내용 위주로 PACKAGE 1,2,3를 정리해줘. (RW, TWY,VOR,VORDME,VORTAC 등 Navigation 시설의 CLOSED, U/S, DECOMMISSIONED, UNSERVICEABLE, OUT, shut down, Not working등 문제는 중요한 내용이니까 빠뜨리지 말것)
모든공항의 이름과 FIR의 이름을 같이 괄호안에 표시해줘.`;

const ROUTE_SYSTEM = `당신은 항공 비행계획서를 분석하여 지도 표시용 JSON 데이터를 생성하는 도구다.
입력된 비행계획서(CFP PLAN + NOTAM PACKAGE 3)를 분석하여 아래 형식의 JSON만 반환한다. 설명, 마크다운, 코드블록 없이 순수 JSON만 출력한다.

출력 형식:
{
  "flight": {
    "callsign": "KAL931",
    "dep": "RKSI",
    "arr": "LIRF",
    "date": "27JUN2026",
    "etd": "0420Z",
    "eta": "1654Z",
    "flightTime": "12h34m",
    "aircraft": "A359",
    "reg": "HL8746"
  },
  "waypoints": [
    {"name": "RKSI", "lat": 37.4602, "lon": 126.4407, "eta": "0420Z"},
    {"name": "NOPIK", "lat": 38.5, "lon": 129.0, "eta": "0455Z"}
  ],
  "notams": [
    {
      "id": "A0001/26",
      "title": "LIRF RWY25 CLSD",
      "lat": 41.8003,
      "lon": 12.2389,
      "radius": 0,
      "content": "LIRF RWY25 CLOSED DUE MAINTENANCE 0300-1800",
      "type": "point"
    },
    {
      "id": "B0002/26",
      "title": "GPS 전파방해 구역",
      "lat": 35.0,
      "lon": 100.0,
      "radius": 150,
      "content": "GPS INTERFERENCE AREA RADIUS 150NM",
      "type": "circle"
    }
  ]
}

규칙:
- waypoints: CFP PLAN의 모든 웨이포인트를 순서대로. 좌표는 실제 항법 좌표를 사용. zt 밑의 actm에 출발시간을 더해 eta 계산.
- 태평양 노선 등 180도 경계를 넘는 경우 경도를 -180~180 범위로 정규화하되 연속성을 유지.
- notams: NOTAM PACKAGE 3에서 유효시간 내 모든 노탐. 좌표가 있으면 lat/lon 지정. 반경 정보 있으면 radius(NM). 좌표 없으면 공항/지역 중심 좌표 사용. type은 "point" 또는 "circle".
- 모든 좌표는 소수점 4자리 십진도(DD.DDDD) 형식.
- JSON 외 어떤 텍스트도 출력하지 않는다.`;

const API_KEY_STORE = 'hwangsbrief_api_key';
const ARCHIVE_STORE = 'hwangsbrief_archive';

let fileData = null;
let history  = [];
let briefText = '';
let mapData   = null;
let leafletMap = null;
let routeLayer = null;
let notamLayer = null;
let showRoute  = true;
let showNotam  = true;

const el = id => document.getElementById(id);

/* ── key ── */
function updateKeyStatus(isSet) {
  const s = el('keyStatus');
  s.textContent = isSet ? '✓ 키 저장됨' : '키 미설정';
  s.className = 'key-status ' + (isSet ? 'set' : 'unset');
}
el('saveKeyBtn').addEventListener('click', () => {
  const v = el('apiKeyInput').value.trim();
  if (!v) return;
  localStorage.setItem(API_KEY_STORE, v);
  el('apiKeyInput').value = '';
  updateKeyStatus(true);
});
el('clearKeyBtn').addEventListener('click', () => {
  localStorage.removeItem(API_KEY_STORE);
  updateKeyStatus(false);
});

/* ── file ── */
function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(1) + ' MB';
}
function setGenEnabled() {
  el('generateBriefBtn').disabled = !fileData;
  el('generateMapBtn').disabled = !fileData;
}
function showFileLoaded(name, size) {
  el('uploadZone').style.display = 'none';
  el('fileLoaded').style.display = 'flex';
  el('fileName').textContent = name;
  el('fileMeta').textContent = formatBytes(size) + ' · 업로드 완료';
}
function clearFile() {
  fileData = null;
  el('fileInput').value = '';
  el('fileLoaded').style.display = 'none';
  el('uploadZone').style.display = 'block';
  setGenEnabled();
}
function loadFile(file) {
  const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  if (isPdf) {
    const r = new FileReader();
    r.onload = e => { fileData = { name: file.name, type: 'pdf', size: file.size, pdfBase64: e.target.result.split(',')[1] }; showFileLoaded(file.name, file.size); setGenEnabled(); };
    r.readAsDataURL(file);
  } else {
    const r = new FileReader();
    r.onload = e => { fileData = { name: file.name, type: 'text', size: file.size, textContent: e.target.result }; showFileLoaded(file.name, file.size); setGenEnabled(); };
    r.readAsText(file, 'UTF-8');
  }
}
const zone = el('uploadZone');
zone.addEventListener('click', () => el('fileInput').click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
el('fileInput').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
el('fileClear').addEventListener('click', clearFile);

/* ── API ── */
function makeContent(prompt, useFullFile) {
  if (fileData.type === 'pdf') {
    return [
      { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: fileData.pdfBase64 } },
      { type: 'text', text: prompt }
    ];
  }
  const text = useFullFile ? fileData.textContent : extractMapSection(fileData.textContent);
  return prompt + '\n\n파일명: ' + fileData.name + '\n\n' + text;
}

function extractMapSection(text) {
  const cfpMatch = text.match(/CFP\s*PLAN[\s\S]{0,3000}/i);
  const cfpSection = cfpMatch ? cfpMatch[0] : text.slice(0, 2000);
  const pkg3Patterns = [
    /NOTAM\s*PACKAGE\s*(?:NO\.?\s*)?3[\s\S]*?(?=CFP\s*PLAN|$)/i,
    /PACKAGE\s*3[\s\S]*?(?=CFP\s*PLAN|$)/i,
    /PKG\s*3[\s\S]*?(?=CFP\s*PLAN|$)/i,
  ];
  let pkg3 = '';
  for (const p of pkg3Patterns) { const m = text.match(p); if (m && m[0].length > 100) { pkg3 = m[0]; break; } }
  if (!pkg3) pkg3 = '[자동추출 실패 — 후반부]\n' + text.slice(Math.floor(text.length * 0.6));
  return '[CFP PLAN]\n' + cfpSection + '\n\n[NOTAM PACKAGE 3]\n' + pkg3;
}

async function callAPI(system, content, maxTokens) {
  const apiKey = localStorage.getItem(API_KEY_STORE);
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'anthropic-beta': 'pdfs-2024-09-25',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      system,
      messages: [{ role: 'user', content }],
    }),
  });
  const data = await response.json();
  if (!response.ok) throw new Error((data.error && data.error.message) || '알 수 없는 오류');
  return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
}

/* ── progress ── */
function startProgress(label) {
  el('errorBox').style.display = 'none';
  el('progressBox').style.display = 'flex';
  el('progressLabel').textContent = label;
  el('generateBriefBtn').disabled = true;
  el('generateMapBtn').disabled = true;
}
function endProgress() {
  el('progressBox').style.display = 'none';
  setGenEnabled();
}
function showError(msg) {
  const b = el('errorBox'); b.textContent = msg; b.style.display = 'flex';
}

/* ── briefing ── */
el('generateBriefBtn').addEventListener('click', async () => {
  if (!fileData || !localStorage.getItem(API_KEY_STORE)) {
    showError('파일과 API 키를 먼저 입력해주세요.'); return;
  }
  startProgress('비행 브리핑 작성 중...');
  try {
    briefText = await callAPI(BRIEFING_SYSTEM, makeContent('다음 원문을 분석하여 운항 브리핑을 작성해주세요.', true), 16000);
    el('briefOutput').textContent = briefText;
    el('briefCard').style.display = 'block';
  } catch(e) { showError('브리핑 오류: ' + e.message); }
  finally { endProgress(); }
});

/* ── JSON repair ── */
function repairJson(raw) {
  try {
    // notams 배열이 잘린 경우: 마지막 완전한 } 까지만 자르고 배열/객체 닫기
    // 전략: 마지막 완전한 notam 객체 위치 찾기
    let s = raw;
    // 마지막 완전한 }]} 또는 }] 패턴 찾기
    for (let i = s.length - 1; i > 0; i--) {
      const sub = s.slice(0, i);
      // 열린 괄호/중괄호 카운트
      let braces = 0, brackets = 0, inStr = false, escape = false;
      for (let j = 0; j < sub.length; j++) {
        const c = sub[j];
        if (escape) { escape = false; continue; }
        if (c === '\\' && inStr) { escape = true; continue; }
        if (c === '"') { inStr = !inStr; continue; }
        if (inStr) continue;
        if (c === '{') braces++;
        else if (c === '}') braces--;
        else if (c === '[') brackets++;
        else if (c === ']') brackets--;
      }
      if (!inStr && braces === 0 && brackets === 0) {
        return JSON.parse(sub);
      }
      if (!inStr && braces >= 0 && brackets >= 0) {
        // 닫힘 문자 붙여보기
        const close = ']}'.repeat(1) + '}'.repeat(braces) + ']'.repeat(brackets);
        try { return JSON.parse(sub + close); } catch(e) {}
        const close2 = '}'.repeat(braces) + ']'.repeat(brackets) + '}';
        try { return JSON.parse(sub + close2); } catch(e) {}
      }
    }
    return null;
  } catch(e) { return null; }
}

/* ── map ── */
el('generateMapBtn').addEventListener('click', async () => {
  if (!fileData || !localStorage.getItem(API_KEY_STORE)) {
    showError('파일과 API 키를 먼저 입력해주세요.'); return;
  }
  startProgress('항로 · 노탐 데이터 분석 중...');
  try {
    let raw = await callAPI(ROUTE_SYSTEM, makeContent('다음 비행계획서를 분석하여 JSON 데이터를 생성해주세요.', false), 16000);
    raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
    // JSON이 잘린 경우 복구 시도
    try {
      mapData = JSON.parse(raw);
    } catch(parseErr) {
      // 마지막 완전한 notam까지만 잘라서 복구
      const fixed = repairJson(raw);
      if (fixed) { mapData = fixed; }
      else throw parseErr;
    }
    renderMap(mapData);
    el('mapCard').style.display = 'block';
  } catch(e) { showError('지도 생성 오류: ' + e.message + ' (JSON 파싱 실패일 수 있어요)'); }
  finally { endProgress(); }
});

/* ── Leaflet map render ── */
function renderMap(data) {
  if (leafletMap) { leafletMap.remove(); leafletMap = null; routeLayer = null; notamLayer = null; }

  leafletMap = L.map('leafletMap', { zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 18
  }).addTo(leafletMap);

  // info box
  if (data.flight) {
    const f = data.flight;
    el('mapInfo').innerHTML =
      '<span class="hi">✈ ' + (f.callsign||'') + '</span><br>' +
      (f.dep||'') + ' → ' + (f.arr||'') + '<br>' +
      'ETD ' + (f.etd||'') + '  ETA ' + (f.eta||'') + '<br>' +
      (f.flightTime||'') + '  ' + (f.aircraft||'') + ' / ' + (f.reg||'');
    el('mapInfo').style.display = 'block';
  }

  // route layer
  routeLayer = L.layerGroup();
  if (data.waypoints && data.waypoints.length) {
    const pts = data.waypoints.map(w => [w.lat, normLon(w.lon, data.waypoints)]);
    L.polyline(pts, { color:'#16a34a', weight:2.5, opacity:.9 }).addTo(routeLayer);
    data.waypoints.forEach(w => {
      const circle = L.circleMarker([w.lat, normLon(w.lon, data.waypoints)], {
        radius:4, color:'#fff', weight:2, fillColor:'#16a34a', fillOpacity:1
      }).bindTooltip('<b>' + w.name + '</b>' + (w.eta ? '<br>' + w.eta : ''), { direction:'top' });
      circle.addTo(routeLayer);
    });
  }
  routeLayer.addTo(leafletMap);

  // notam layer
  notamLayer = L.layerGroup();
  if (data.notams && data.notams.length) {
    data.notams.forEach(n => {
      const popup = '<b>' + (n.title||n.id||'NOTAM') + '</b><br><small>' + (n.content||'').replace(/\n/g,'<br>') + '</small>';
      if (n.type === 'circle' && n.radius > 0) {
        L.circle([n.lat, n.lon], { radius: n.radius * 1852, color:'#dc2626', fillColor:'#dc2626', fillOpacity:.15, weight:2 })
          .bindPopup(popup).addTo(notamLayer);
      } else {
        const icon = L.divIcon({ html:'<div style="width:14px;height:14px;background:#dc2626;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.4);"></div>', iconSize:[14,14], iconAnchor:[7,7] });
        L.marker([n.lat, n.lon], { icon }).bindPopup(popup).addTo(notamLayer);
      }
    });
  }
  notamLayer.addTo(leafletMap);

  // fit bounds
  try {
    const allPts = [];
    if (data.waypoints) data.waypoints.forEach(w => allPts.push([w.lat, normLon(w.lon, data.waypoints)]));
    if (data.notams) data.notams.forEach(n => allPts.push([n.lat, n.lon]));
    if (allPts.length) leafletMap.fitBounds(L.latLngBounds(allPts), { padding:[30,30] });
  } catch(e) { leafletMap.setView([40, 100], 3); }

  // toggles
  el('toggleRoute').classList.toggle('off', !showRoute);
  el('toggleNotam').classList.toggle('off', !showNotam);
}

function normLon(lon, waypoints) {
  // 태평양 노선: 첫 웨이포인트가 동경이면 서경 보정
  if (!waypoints || !waypoints.length) return lon;
  const first = waypoints[0].lon;
  if (first > 100 && lon < 0) return lon + 360;
  return lon;
}

el('toggleRoute').addEventListener('click', () => {
  showRoute = !showRoute;
  el('toggleRoute').classList.toggle('off', !showRoute);
  if (routeLayer) { showRoute ? leafletMap.addLayer(routeLayer) : leafletMap.removeLayer(routeLayer); }
});
el('toggleNotam').addEventListener('click', () => {
  showNotam = !showNotam;
  el('toggleNotam').classList.toggle('off', !showNotam);
  if (notamLayer) { showNotam ? leafletMap.addLayer(notamLayer) : leafletMap.removeLayer(notamLayer); }
});

/* ── copy / save ── */
el('copyBriefBtn').addEventListener('click', () => {
  if (!briefText) return;
  navigator.clipboard.writeText(briefText).then(() => {
    const b = el('copyBriefBtn'); const old = b.textContent;
    b.textContent = '복사됨'; setTimeout(() => b.textContent = old, 1500);
  });
});
el('saveBriefBtn').addEventListener('click', () => {
  if (!briefText) return;
  const entry = { id: String(Date.now()), timestamp: new Date().toISOString(), preview: (fileData ? fileData.name : '') || '(없음)', brief: briefText, mapData: mapData ? JSON.stringify(mapData) : null };
  history = [entry, ...history].slice(0, 20);
  localStorage.setItem(ARCHIVE_STORE, JSON.stringify(history));
  renderArchive();
});

/* ── archive ── */
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function renderArchive() {
  el('archiveSection').style.display = history.length ? 'block' : 'none';
  const list = el('archiveList'); list.innerHTML = '';
  const sb = el('sidebarArchive'); sb.innerHTML = '';
  if (!history.length) { sb.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:4px 10px;">저장된 항목 없음</div>'; return; }
  history.forEach(h => {
    const date = new Date(h.timestamp).toLocaleString('ko-KR');
    const item = document.createElement('div'); item.className = 'archive-item';
    const loadBtn = document.createElement('button'); loadBtn.className = 'archive-load';
    loadBtn.innerHTML = '<div class="archive-preview">' + escHtml(h.preview) + '</div><div class="archive-meta">' + escHtml(date) + '</div>';
    loadBtn.addEventListener('click', () => {
      briefText = h.brief;
      el('briefOutput').textContent = h.brief;
      el('briefCard').style.display = 'block';
      if (h.mapData) {
        try { mapData = JSON.parse(h.mapData); renderMap(mapData); el('mapCard').style.display = 'block'; } catch(e) {}
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    const del = document.createElement('button'); del.className = 'archive-del'; del.textContent = '✕';
    del.addEventListener('click', () => { history = history.filter(x => x.id !== h.id); localStorage.setItem(ARCHIVE_STORE, JSON.stringify(history)); renderArchive(); });
    item.appendChild(loadBtn); item.appendChild(del); list.appendChild(item);
    const sbBtn = document.createElement('button'); sbBtn.className = 'sidebar-btn';
    sbBtn.innerHTML = '<span class="dot dot-gray"></span>' + escHtml(h.preview.slice(0, 18));
    sbBtn.addEventListener('click', () => loadBtn.click());
    sb.appendChild(sbBtn);
  });
}

/* ── reset ── */
el('resetBtn').addEventListener('click', () => {
  clearFile();
  el('briefCard').style.display = 'none';
  el('mapCard').style.display = 'none';
  el('progressBox').style.display = 'none';
  el('errorBox').style.display = 'none';
  briefText = ''; mapData = null;
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
});

/* ── init ── */
updateKeyStatus(!!localStorage.getItem(API_KEY_STORE));
try { history = JSON.parse(localStorage.getItem(ARCHIVE_STORE) || '[]'); } catch { history = []; }
renderArchive();
</script>
